name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: bganalyze-macos-arm64
            archive: tar.gz
          - goos: linux
            goarch: amd64
            name: bganalyze-linux-amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            name: bganalyze-linux-arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            name: bganalyze-windows-amd64
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Cross-compile and archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          BINARY="${{ matrix.name }}${EXT}"
          go build -o "$BINARY" .
          chmod +x "$BINARY"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip "${{ matrix.name }}.zip" "$BINARY"
          else
            tar czf "${{ matrix.name }}.tar.gz" "$BINARY"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives
        run: |
          mkdir release
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
